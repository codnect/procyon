name: Feature Request
description: Suggest a new feature or improvement for Procyon
title: "feature: import/path: feature title"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to Procyon.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this feature solve?
      description: Describe the problem or limitation you are trying to address.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature or behavior you would like Procyon to support.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: What alternatives have you considered?
      description: Describe any alternative solutions or workarounds you have considered.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context or examples that may help explain the request.